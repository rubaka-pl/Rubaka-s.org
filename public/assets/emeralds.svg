<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <filter id="blur-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur-md" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    
    <g id="gem1">
      <polygon points="0,-40 35,-15 10,20 -30,0" fill="#3a512b"/>
      <polygon points="10,20 35,-15 45,30 20,50" fill="#293c1d"/>
      <polygon points="-30,0 10,20 20,50 -20,40" fill="#1f2d15"/>
    </g>

    <g id="gem2">
      <polygon points="-20,-30 20,-40 40,-10 0,10" fill="#3a512b"/>
      <polygon points="0,10 40,-10 20,40 -10,30" fill="#1f2d15"/>
      <polygon points="-20,-30 0,10 -10,30 -30,0" fill="#293c1d"/>
    </g>
  </defs>
  
  <use href="#gem1" transform="translate(120, 150) scale(3.5) rotate(45)" filter="url(#blur-lg)" opacity="0.6"/>
  <use href="#gem2" transform="translate(750, 650) scale(4) rotate(-30)" filter="url(#blur-lg)" opacity="0.5"/>
  <use href="#gem1" transform="translate(-50, 600) scale(2.5) rotate(80)" filter="url(#blur-lg)" opacity="0.7"/>
  <use href="#gem2" transform="translate(600, -50) scale(3) rotate(110)" filter="url(#blur-lg)" opacity="0.6"/>
  
  <use href="#gem2" transform="translate(650, 200) scale(1.8) rotate(15)" filter="url(#blur-md)"/>
  <use href="#gem1" transform="translate(300, 400) scale(1.4) rotate(-60)" filter="url(#blur-md)"/>
  <use href="#gem2" transform="translate(250, 750) scale(2) rotate(135)" filter="url(#blur-md)"/>
  <use href="#gem1" transform="translate(800, 350) scale(1.5) rotate(40)" filter="url(#blur-sm)"/>
  <use href="#gem2" transform="translate(50, 350) scale(1.2) rotate(-25)" filter="url(#blur-sm)"/>
  
  <use href="#gem1" transform="translate(500, 700) scale(2.2) rotate(-10)"/>
  <use href="#gem2" transform="translate(150, 280) scale(1.6) rotate(75)"/>
  <use href="#gem1" transform="translate(850, 800) scale(1.9) rotate(-100)"/>
  <use href="#gem2" transform="translate(450, 120) scale(1.3) rotate(25)"/>
  <use href="#gem1" transform="translate(350, -20) scale(1.7) rotate(60)"/>
</svg>
